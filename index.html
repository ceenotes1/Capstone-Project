<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./common.css">
  <script src="components/header.js" type="text/javascript" defer></script>
  <script src="components/footer.js" type="text/javascript" defer></script>
  <title>Community Music Center of Boston | CMCB</title>
</head>

<body>

  <header-component></header-component>

  <header class="hero">
    <h2>Music Education for Every Age and Stage</h2>
    <p>Explore private lessons, group classes, and community music programs.</p>
    <button>Register Now</button>
  </header>

  <section class="programs">
    <h2>Featured Programs</h2>
    <div class="card-container">
      <div class="card">Private Lessons</div>
      <div class="card">Group Classes</div>
      <div class="card">Community Programs</div>
    </div>
  </section>

  <section class="pathways">
    <h2>Student Pathways</h2>
    <div class="card-container">
      <div class="card">Explore</div>
      <div class="card">Learn</div>
      <div class="card">Perform</div>
      <div class="card">Grow</div>
    </div>
  </section>

  <section class="cta">
    <h2>Ready to Start Your Musical Journey?</h2>
    <button>Submit Inquiry</button>
  </section>


  <script src="script.js"></script>
  <footer-component></footer-component>
</body>

</html>
